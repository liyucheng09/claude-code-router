name: Publish to dist branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Create package.json for dist branch
        run: |
          node -e "
            const pkg = require('./package.json');
            const distPkg = {
              name: pkg.name,
              version: pkg.version,
              description: pkg.description,
              bin: { ccr: 'cli.js' },
              engines: { node: '>=20.0.0' },
              keywords: pkg.keywords,
              author: pkg.author,
              license: pkg.license,
              repository: {
                type: 'git',
                url: 'https://github.com/liyucheng09/claude-code-router.git'
              }
            };
            require('fs').writeFileSync('./dist/package.json', JSON.stringify(distPkg, null, 2));
          "

      - name: Publish to dist branch
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: build from ${{ github.sha }}"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" HEAD:dist
